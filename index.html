<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }

    /* Video fills the viewport; hidden until it starts */
    #playerWrap { position:fixed; inset:0; display:none; }
    #playerWrap iframe { width:100%; height:100%; border:0; display:block; }

    /* Single centered red button layer */
    #clickLayer {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000;
    }
    .playBut { display:inline-block; width:214px; height:214px; cursor:pointer; background:transparent; border:0; }

    .triangle {
      transition: stroke-dashoffset .7s ease-in-out, stroke .3s ease-in-out, transform .7s ease-in-out;
      stroke-dasharray:240; stroke-dashoffset:480; stroke:#000; fill:none; stroke-width:7;
      stroke-linecap:round; stroke-linejoin:round; stroke-miterlimit:10;
    }
    .circle {
      stroke:#e32636; stroke-dasharray:650; stroke-dashoffset:650; opacity:.35;
      transition: stroke-dashoffset .5s ease-in-out, opacity .3s ease-in-out;
      fill:none; stroke-width:7; stroke-linecap:round; stroke-linejoin:round; stroke-miterlimit:10;
    }
    .playBut:hover .triangle { stroke-dashoffset:0; opacity:1; stroke:#ff4d4d; animation:nudge .7s ease-in-out; }
    .playBut:hover .circle { stroke-dashoffset:0; opacity:1; }

    @keyframes nudge {
      0% { transform:translateX(0) } 30% { transform:translateX(-5px) }
      50% { transform:translateX(5px) } 70% { transform:translateX(-2px) } 100% { transform:translateX(0) }
    }
  </style>
</head>
<body>

  <!-- One red button only -->
  <div id="clickLayer">
    <button id="playBtn" class="playBut" aria-label="Play video" title="Play">
      <svg width="213.7" height="213.7" viewBox="0 0 213.7 213.7" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <polygon class="triangle" points="73.5,62.5 148.5,105.8 73.5,149.1"></polygon>
        <circle class="circle" cx="106.8" cy="106.8" r="103.3"></circle>
      </svg>
    </button>
  </div>

  <!-- YouTube player will be created here -->
  <div id="playerWrap"><div id="player"></div></div>

  <script>
    // Your Shorts ID
    const VIDEO_ID = "_GSZ7IVtd_Y";

    const playBtn = document.getElementById("playBtn");
    const clickLayer = document.getElementById("clickLayer");
    const playerWrap = document.getElementById("playerWrap");
    let player, apiLoaded = false, started = false;

    function loadYTAPI() {
      if (apiLoaded) return;
      apiLoaded = true;
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    // YouTube API callback
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player("player", {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1,
          controls: 0,
          loop: 1,
          playlist: VIDEO_ID,     // required for looping single video
          rel: 0,
          playsinline: 1,
          modestbranding: 1
        },
        events: {
          onReady: (e) => {
            try {
              e.target.unMute();
              e.target.playVideo(); // user-gesture path
              // Make sure autoplay permission is set on the iframe
              const ifr = e.target.getIframe();
              ifr.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");
            } catch (_) {}
          },
          onStateChange: (e) => {
            if (!started && e.data === YT.PlayerState.PLAYING) {
              started = true;
              clickLayer.style.display = "none";
              playerWrap.style.display = "block";
            }
          }
        }
      });
    };

    // Click → load API, build player, and start
    playBtn.addEventListener("click", (ev) => {
      ev.preventDefault();
      loadYTAPI();

      // Safety fallback: if autoplay gets blocked, open in a new tab
      setTimeout(() => {
        if (!started) {
          window.open(`https://www.youtube.com/watch?v=${VIDEO_ID}`, "_blank", "noopener");
        }
      }, 2000);
    });
  </script>
</body>
</html>
