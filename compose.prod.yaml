services:
  migrate:
    image: ${DOCKERHUB_USERNAME:?required}/21-07-monorepo:migrator-${IMAGE_TAG:?required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
    restart: "no"
  
  backend:
    image: ${DOCKERHUB_USERNAME:?required}/21-07-monorepo:backend-${IMAGE_TAG:?required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  
  ws:
    image: ${DOCKERHUB_USERNAME:?required}/21-07-monorepo:ws-${IMAGE_TAG:?required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  
  frontend:
    image: ${DOCKERHUB_USERNAME:?required}/21-07-monorepo:frontend-${IMAGE_TAG:?required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped