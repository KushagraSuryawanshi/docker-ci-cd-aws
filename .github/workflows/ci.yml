name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate prisma client
        run: bun run db:generate

      - name: Type check
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

  publish-backend:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.backend
          target: runner
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:backend-${{github.sha}}
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:backend-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish-ws:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push ws image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ws
          target: runner
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:ws-${{github.sha}}
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:ws-latest
          cache-from: type=gha,scope=ws
          cache-to: type=gha,mode=max,scope=ws

  publish-frontend:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.frontend
          target: runner
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:frontend-${{github.sha}}
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:frontend-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  publish-migrator:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push migrator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.backend
          target: migrator
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:migrator-${{github.sha}}
            ${{secrets.DOCKERHUB_USERNAME}}/21-07-monorepo:migrator-latest
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator

  deploy:
    needs:
      - publish-backend
      - publish-ws
      - publish-frontend
      - publish-migrator

    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{secrets.EC2_KNOWN_HOSTS}}
        run: |
          mkdir -p ~/.ssh 
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts 
          chmod 600 ~/.ssh/known_hosts
        
      - name: Copy production Compose file
        run: |
          scp -i ~/.ssh/deploy_key compose.prod.yaml "${{secrets.EC2_USER}}@${{secrets.EC2_HOST}}:/opt/21-07-monorepo/compose.prod.yaml"

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key "${{secrets.EC2_USER}}@{{secrets.EC2_HOST}}" 'cd /opt/21-07-monorepo && pwd && ls -la'

      - name: Deploy to EC2_HOST
        run: |
          ssh -i ~/.ssh/deploy_key "${{secrets.EC2_USER}}@${{EC2_HOST}}" "cd /opt/21-07-monorepo && \
          export IMAGE_TAG='${{github.sha}}' && \
          docker compose --env-file .env.production -f compose.prod.yaml pull && \
          docker compose --env-file .env.production -f compose.prod.yaml run --rm migrate && \
          docker compsoe --env-file .env.production -f compose.prod.yaml up -d --no-deps backend ws frontend "